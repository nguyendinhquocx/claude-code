name: Sync upstream

on:
  schedule:
    # 03:17 Asia/Ho_Chi_Minh = 20:17 UTC hôm trước
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name)
          gh repo sync "$GITHUB_REPOSITORY" --branch "$BRANCH"
